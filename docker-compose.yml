services:
  app:
    build: .
    container_name: shorts-spreader
    restart: unless-stopped
    ports:
      - "7780:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
