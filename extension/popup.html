<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>쇼츠 살포기</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">연결 상태</p>
        <div class="hero-row">
          <h1>쇼츠 살포기</h1>
          <span id="connection-pill" class="pill disconnected">연결 끊김</span>
        </div>
        <p id="status-copy" class="status-copy">백그라운드에서 소켓을 확인하고 있습니다.</p>
        <p id="socket-meta" class="status-copy">소켓 정보가 여기에 표시됩니다.</p>
        <p id="http-meta" class="status-copy">HTTP 상태가 여기에 표시됩니다.</p>
      </section>

      <section class="panel">
        <label class="field" for="nickname-input">
          <span>닉네임</span>
          <input id="nickname-input" type="text" maxlength="40" placeholder="조용한 수달" autocomplete="off" />
        </label>
        <button id="save-nickname-button" class="primary-button" type="button">닉네임 저장</button>
      </section>

      <section class="panel">
        <label class="field mute-toggle">
          <span>수신 소리</span>
          <input id="mute-checkbox" type="checkbox" checked />
          <span id="mute-label">켜짐</span>
        </label>
      </section>

      <section class="stats-grid" aria-label="내 카운터">
        <article class="stat-card">
          <span class="stat-label">내 살포 수</span>
          <strong id="spread-count">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">내 적중 수</span>
          <strong id="hit-count">0</strong>
        </article>
      </section>

      <button id="dashboard-button" class="secondary-button" type="button">대시보드 열기</button>
    </main>
    <script src="shared.js"></script>
    <script src="popup-state.js"></script>
    <script src="popup.js"></script>
  </body>
  </html>
